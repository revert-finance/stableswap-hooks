name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Read Foundry version
        id: foundry-version
        run: echo "version=$(cat .foundry-version)" >> "$GITHUB_OUTPUT"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ steps.foundry-version.outputs.version }}

      - name: Show Forge version
        env:
          FOUNDRY_VERSION: ${{ steps.foundry-version.outputs.version }}
        run: |
          forge --version
          forge --version | grep -q "forge Version: ${FOUNDRY_VERSION#v}"

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv
